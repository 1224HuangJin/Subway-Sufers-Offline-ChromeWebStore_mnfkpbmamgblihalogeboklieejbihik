<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Subway Surfers: San Francisco</title>
    <style>
      body { margin: 0; background-color: #231F20; width: 100vw; height: 100vh; overflow: hidden; }
      #unityContainer { width: 100%; height: 100%; }
    </style>

    <!-- 1. 首先让浏览器纯净地加载官方的 UnityLoader.js -->
    <script src="UnityLoader.2019.2.js"></script>

    <!-- 2. 当官方脚本加载完毕后，我们在这里注入精准的 4399 修复补丁 -->
    <script>
      // 补丁 A：伪造 4399 接口，防止因缺少全局变量而崩溃
      window.my4399UnityModule = {
        init: function() { return true; },
        showAd: function() { return true; },
        log: function() { return true; }
      };
      
      window.showUnitywebNoSupport = function() { console.log('拦截 4399 不支持提示'); };
      if (window.parent) { window.parent.showUnitywebNoSupport = window.showUnitywebNoSupport; }

      // 补丁 B：通过 Proxy 保护 UnityLoader 不被 4399 魔改动态调用带崩
      if (window.UnityLoader) {
        window.UnityLoader = new Proxy(window.UnityLoader, {
          get: function(target, prop) {
            // 如果是原版 Unity 本身就持有的关键方法 (如 instantiate)，直接返回原版
            if (prop in target) {
              return target[prop];
            }
            // 只要不是原版持有的方法（也就是 4399 强行插入的动态垃圾调用），自动用空函数打发它
            return function() { 
              console.log(`[补丁成功] 自动放行了魔改调用: UnityLoader.${String(prop)}`);
              return true; 
            };
          }
        });
      }
    </script>

    <!-- 3. 核心正版引擎安全就位，开始加载游戏资源 JSON -->
    <script>
      var unityInstance = UnityLoader.instantiate("unityContainer", "Build/SanFrancisco/SanFrancisco.json");
    </script>
  </head>
  <body>
    <div id="unityContainer"></div>
  </body>
</html>
