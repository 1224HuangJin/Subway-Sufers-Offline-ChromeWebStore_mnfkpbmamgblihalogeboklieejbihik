<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
<script>
  // 1. 完美伪造 4399 游戏接口对象
  window.my4399UnityModule = new Proxy({}, {
    get: function(target, prop) {
      return function() { 
        console.log(`[4399 Mock] 拦截了对 4399 方法 ${prop} 的调用`);
        return true; 
      };
    }
  });

  // 2. 拦截并伪造不兼容提示
  window.showUnitywebNoSupport = function() {
    console.warn("[4399 Mock] 游戏试图触发不支持提示，已拦截。");
  };
  if (window.parent) {
    window.parent.showUnitywebNoSupport = window.showUnitywebNoSupport;
  }

  // 3. ✨核心修复：为全局 UnityLoader 对象注入防崩溃代理
  // 无论代码通过 UnityLoader[r] 调用什么奇怪的方法，都直接返回一个空函数，防止抛出 TypeError
  if (!window.UnityLoader) {
    window.UnityLoader = {};
  }
  
  window.UnityLoader = new Proxy(window.UnityLoader, {
    get: function(target, prop) {
      // 如果原本就有这个属性/方法（比如原生 Unity 核心方法），直接返回原版
      if (prop in target) {
        return target[prop];
      }
      // 如果没有（比如被魔改出来的 4399 特有属性），动态返回一个空函数，确保不崩溃
      console.log(`[UnityLoader Mock] 拦截并放行了不存在的动态调用: UnityLoader.${String(prop)}`);
      return function() { return true; };
    },
    set: function(target, prop, value) {
      target[prop] = value;
      return true;
    }
  });
</script>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Subway Surfers: San Francisco</title>
    <style>
      body { margin: 0; background-color: #231F20; width: 100vw; height: 100vh; overflow: hidden; }
      #unityContainer { width: 100%; height: 100%; }
    </style>
    <!-- 引入你仓库里本来就有的官方 UnityLoader -->
    <script src="UnityLoader.2019.2.js"></script>
    <script>
      // 直接绕过第 3 方加载器，让官方 Unity 引擎直接去读 JSON
      var unityInstance = UnityLoader.instantiate("unityContainer", "Build/SanFrancisco/SanFrancisco.json");
    </script>
  </head>
  <body>
    <div id="unityContainer"></div>
  </body>
</html>
