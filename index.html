<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Subway Surfers: San Francisco</title>
    <style>
      body { margin: 0; background-color: #231F20; width: 100vw; height: 100vh; overflow: hidden; }
      #unityContainer { width: 100%; height: 100%; }
    </style>
  </head>
  <body>
    <div id="unityContainer"></div>

    <script>
      // 1. 注入 4399 基础全局变量
      window.my4399UnityModule = {
        init: function() { return true; },
        showAd: function() { return true; },
        log: function() { return true; }
      };
      window.showUnitywebNoSupport = function() { console.log('拦截 4399 不支持提示'); };
      if (window.parent) { window.parent.showUnitywebNoSupport = window.showUnitywebNoSupport; }

      console.log("[核心修复] 正在动态重写 Unity 核心加载器...");

      // 2. 读取并对 UnityLoader 进行双重手术
      fetch('UnityLoader.2019.2.js')
        .then(response => {
          if (!response.ok) throw new Error('读取 UnityLoader 失败');
          return response.text();
        })
        .then(sourceCode => {
          // 手术一：消灭 UnityLoader[r] is not a function 崩溃
          let patchedCode = sourceCode.replace(/UnityLoader\s*\[([^\]]+)\]\s*\(/g, function(match, expression) {
            return `(typeof UnityLoader[${expression}] === "function" ? UnityLoader[${expression}] : function(){ return true; })(`;
          });

          // 手术二：【解决黑屏核心】强制关闭 UnityLoader 内部可能导致的 WebGL 异常解压行为
          // 强行让 Unity 的配置中，decompressingSteps 的 gzip / brotli 校验直接放行原始数据
          patchedCode = patchedCode.replace(/decompressingSteps\s*=\s*\[[^\]]+\]/g, 'decompressingSteps = []');

          // 3. 执行装甲版代码
          const blob = new Blob([patchedCode], { type: 'application/javascript' });
          const blobUrl = URL.createObjectURL(blob);
          const scriptElement = document.createElement('script');
          scriptElement.src = blobUrl;
          
          scriptElement.onload = function() {
            console.log("[核心修复] UnityLoader 文本手术完成，正在拉取并注入游戏配置...");

            // 4. 读取游戏的核心配置文件 JSON，在传入引擎前强行修改它的解压声明
            fetch('Build/SanFrancisco/SanFrancisco.json')
              .then(res => res.json())
              .then(configData => {
                // 强制将文件编码格式在前端重置为 false（告诉引擎不要指望服务器处理 gzip，在前端直接当成原始流读取）
                if (configData.webgl Kimberly || true) { 
                  configData.brotliCompressUrl = null;
                  configData.gzipCompressUrl = null;
                }
                
                console.log("[核心修复] 游戏数据流配置重置成功，正在唤醒 3D 画布...");
                // 5. 启动游戏
                window.unityInstance = UnityLoader.instantiate("unityContainer", configData);
              })
              .catch(err => {
                console.warn("读取自定义配置失败，降级使用默认路径加载:", err);
                window.unityInstance = UnityLoader.instantiate("unityContainer", "Build/SanFrancisco/SanFrancisco.json");
              });
          };

          document.head.appendChild(scriptElement);
        })
        .catch(error => {
          console.error("拦截失败:", error);
          const backupScript = document.createElement('script');
          backupScript.src = "UnityLoader.2019.2.js";
          backupScript.onload = function() {
            window.unityInstance = UnityLoader.instantiate("unityContainer", "Build/SanFrancisco/SanFrancisco.json");
          };
          document.head.appendChild(backupScript);
        });
    </script>
  </body>
</html>
